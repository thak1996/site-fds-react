services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: site-fds-react:dev
    container_name: site-fds-react
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: '1'
      WATCHPACK_POLLING: 'true'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mailpit:
    image: axllent/mailpit
    container_name: site-fds-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP port
      - '8025:8025' # Web UI
